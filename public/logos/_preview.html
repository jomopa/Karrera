<!doctype html>
<html lang="es"><meta charset="utf-8"/><title>Karrera logos</title>
<style>
body{margin:0;background:#0b0d10;color:#f2f3f5;font-family:system-ui;padding:28px}
h1{font-size:1rem;font-weight:600;margin:0 0 18px;opacity:.8}
.row{display:flex;flex-wrap:wrap;gap:18px}
.plate{width:80px;height:80px;background:#fff;border-radius:14px;overflow:hidden;border:1px solid #ffffff22;display:grid;place-items:center}
.plate img{width:100%;height:100%;object-fit:contain;display:block}
.plate.sm{width:28px;height:28px;border-radius:7px}
.plate.md{width:48px;height:48px;border-radius:10px}
p{margin:8px 0 0;font-size:12px;opacity:.65;text-align:center}
.cell{display:flex;flex-direction:column;align-items:center}
section{margin-bottom:28px}
</style>
<body>
<h1>Logos cuadrados reales — UI sizes</h1>
<section><div class="row"><div class="cell"><div class="plate"><img src="psoe.svg" alt="psoe"/></div><p>psoe</p></div><div class="cell"><div class="plate"><img src="pp.svg" alt="pp"/></div><p>pp</p></div><div class="cell"><div class="plate"><img src="iu.svg" alt="iu"/></div><p>iu</p></div><div class="cell"><div class="plate"><img src="upyd.svg" alt="upyd"/></div><p>upyd</p></div><div class="cell"><div class="plate"><img src="podemos.svg" alt="podemos"/></div><p>podemos</p></div><div class="cell"><div class="plate"><img src="ciudadanos.svg" alt="ciudadanos"/></div><p>ciudadanos</p></div><div class="cell"><div class="plate"><img src="vox.svg" alt="vox"/></div><p>vox</p></div><div class="cell"><div class="plate"><img src="sumar.png" alt="sumar"/></div><p>sumar</p></div></div></section>
<section><h1>18px (poll strip)</h1><div class="row"><div class="cell"><div class="plate sm"><img src="psoe.svg"/></div></div><div class="cell"><div class="plate sm"><img src="pp.svg"/></div></div><div class="cell"><div class="plate sm"><img src="iu.svg"/></div></div><div class="cell"><div class="plate sm"><img src="upyd.svg"/></div></div><div class="cell"><div class="plate sm"><img src="podemos.svg"/></div></div><div class="cell"><div class="plate sm"><img src="ciudadanos.svg"/></div></div><div class="cell"><div class="plate sm"><img src="vox.svg"/></div></div><div class="cell"><div class="plate sm"><img src="sumar.png"/></div></div></div></section>
<section><h1>36px (create / HUD)</h1><div class="row"><div class="cell"><div class="plate md"><img src="psoe.svg"/></div></div><div class="cell"><div class="plate md"><img src="pp.svg"/></div></div><div class="cell"><div class="plate md"><img src="iu.svg"/></div></div><div class="cell"><div class="plate md"><img src="upyd.svg"/></div></div><div class="cell"><div class="plate md"><img src="podemos.svg"/></div></div><div class="cell"><div class="plate md"><img src="ciudadanos.svg"/></div></div><div class="cell"><div class="plate md"><img src="vox.svg"/></div></div><div class="cell"><div class="plate md"><img src="sumar.png"/></div></div></div></section>
</body></html>
